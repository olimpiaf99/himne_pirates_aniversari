<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Roig i Negre</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ===========================
     HOME
=========================== -->

<section id="home" class="screen active">

    <img src="assets/logo_pirates_1.png" class="logo" alt="logo">

    <h1>En Roig i Negre</h1>

    <div class="language-buttons">

        <button class="language-btn" data-lang="val">Valencià</button>
        <button class="language-btn" data-lang="es">Español</button>
        <button class="language-btn" data-lang="en">English</button>

    </div>

</section>


<!-- ===========================
     SONG
=========================== -->

<section id="song" class="screen">

    <header class="song-header">

        <button id="backButton" class="back-btn">←</button>

    </header>

    <div class="song-logo">
        <img src="assets/logo_pirates_1.png" alt="logo">
        <h1>En Roig i Negre</h1>
    </div>

    <main>
        <div id="lyrics"></div>
    </main>

</section>


<!-- OVERLAY -->
<div id="overlay"></div>

<!-- BOTTOM SHEET -->
<div id="bottomSheet">

    <div class="sheet-handle"></div>

    <button id="closeSheet">✕</button>

    <h2 id="sheetTitle"></h2>
    <div id="sheetContent"></div>

</div>


<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
